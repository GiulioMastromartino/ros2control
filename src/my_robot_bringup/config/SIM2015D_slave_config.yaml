# Configuration file for Wittenstein Simco drive

# The drive uses CoE therefore "functions and parameters are equal to CANopen" (/EtherCAT (EC))

# Line 1083 ESI file
vendor_id: 0x0000010A # MODIFIED!!!
# Line 1089 ESI file
product_id: 0x50019468  # MODIFIED!!!
# Distributed Clock Synchronization register. If not used remove or set to 0x00
#           assign_activate: 0x00  # DC Synch register
auto_fault_reset: false  # true = automatic fault reset, false = fault reset on rising edge command interface "reset_fault"

# /CANopen (CAN)/Controlling motion with SDO
sdo:  # sdo data to be transferred at drive startup
  # Interpolation time = 0x60C2:1 value * 10 ^ 0x60C2:2 seconds
  - {index: 0x60C2, sub_index: 1, type: uint8, value: 10} # Set interpolation time for cyclic modes to 10 ms
  - {index: 0x60C2, sub_index: 2, type: int8, value: -3} # Set base 10-3s

  # - {index: 0x6060, sub_index: 0, type: int8, value: 3} # Set the operation mode to Profile Velocity
  # Switch the drive state machine to status Operation enabled
  # - {index: 0x6040, sub_index: 7, type: int16, value: 0}
  # - {index: 0x6040, sub_index: 3, type: int16, value: 1}
  # - {index: 0x6040, sub_index: 2, type: int16, value: 1}
  # - {index: 0x6040, sub_index: 1, type: int16, value: 1}
  # - {index: 0x6040, sub_index: 0, type: int16, value: 1}

  # Set operation mode to Profile Velocity
  - {index: 0x6060, sub_index: 0, type: int8,   value: 3}
  # Drive state machine transitions (Controlword object 0x6040 sub 0 only)
  - { index: 0x6040, sub_index: 0, type: uint16, value: 0x0006 }  # Shutdown
  - { index: 0x6040, sub_index: 0, type: uint16, value: 0x0007 }  # Switch on
  - { index: 0x6040, sub_index: 0, type: uint16, value: 0x000F }  # Enable operation
  # - { index: 0x350f, sub_index: 0, type: uint16, value: 1 }  # Encoder emulation


rpdo:  # RxPDO = receive PDO Mapping
  # /Appendix/EtherCAT dictionary/Communication Data/Receive PDO Mapping Parameter 2 1601:0 (EC)
  - index: 0x1600 # MODIFIED!!!
    channels:
      # /CANopen (CAN)/CANopen drive functions CiA DS402/Control word
      - {index: 0x6040, sub_index: 0, type: uint16, default: 0}  # Control word
      # /CANopen (CAN)/CANopen drive functions CiA DS402/Operation mode Profile Velocity
      - {index: 0x60ff, sub_index: 0, type: int32, command_interface: velocity, factor: 10, default: 0}  # Target velocity    <---
      # /Appendix/EtherCAT dictionary/Position Control Data/Velocity Offset 60B1:0 (EC)
      - {index: 0x60b1, sub_index: 0, type: int32, default: 0}  # Offset velocity
      # /CANopen (CAN)/Controlling motion with SDO
      - {index: 0x6060, sub_index: 0, type: int8, default: 3}  # Mode of operation

tpdo:  # TxPDO = transmit PDO Mapping
  # /Appendix/EtherCAT dictionary/Communication Data/Transmit PDO Mapping Parameter 2 1A01:0 (EC)
  - index: 0x1a00 # MODIFIED!!!
    channels:
      # /CANopen (CAN)/CANopen drive functions CiA DS402/Status word
      - {index: 0x6041, sub_index: 0, type: uint16}  # Status word
      # /CANopen (CAN)/CANopen drive functions CiA DS402/Operation mode Profile Velocity
      - {index: 0x6064, sub_index: 0, type: int32, state_interface: position, factor: 8.7656e-5}  # Position actual value    <---
      # /CANopen (CAN)/CANopen drive functions CiA DS402/Operation mode Profile Velocity
      # MODIFIED!!! Before 0x6069
      - {index: 0x606c, sub_index: 0, type: int32, state_interface: velocity, factor: .1}  # Velocity actual value    <---
      # /CANopen (CAN)/Controlling motion with SDO
      - {index: 0x6061, sub_index: 0, type: int8}  # Mode of operation display
