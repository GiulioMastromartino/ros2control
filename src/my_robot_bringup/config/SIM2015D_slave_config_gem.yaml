vendor_id: 0x0000010a
product_id: 0x02fb3f44
assign_activate: 0x0000       # SM-Sync: corretto, NON usare 0x0300 in SM-Sync mode
auto_fault_reset: true
esi: "WittensteinCyberDrive.xml"

sdo:
  # Imposta modalità operativa via SDO (come fa l'InitCmd del modulo PV)
  - index: 0x6060
    sub_index: 0
    type: int8
    value: 0x03               # Profile Velocity Mode

  # Sequenza CiA402
  - index: 0x6040
    sub_index: 0
    type: uint16
    value: 0x0006             # Shutdown
  - index: 0x6040
    sub_index: 0
    type: uint16
    value: 0x0007             # Switch On
  - index: 0x6040
    sub_index: 0
    type: uint16
    value: 0x000F             # Enable Operation

rpdo:
  - index: 0x1601             # Modulo PV: esattamente 2 entries come da ESI
    channels:
      - index: 0x6040
        sub_index: 0x00
        type: uint16
        default: 0
      - index: 0x60FF
        sub_index: 0x00
        type: int32
        command_interface: velocity
        factor: 3.99287e5
        default: 0
      # RIMUOVI: 0x60B1 (non appartiene al modulo PV)
      # RIMUOVI: 0x6060 (non appartiene al modulo PV, va via SDO)

tpdo:
  - index: 0x1A01             # Modulo PV: esattamente 2 entries come da ESI
    channels:
      - index: 0x6041
        sub_index: 0x00
        type: uint16
      - index: 0x606C         # Velocity Actual Value (NON 0x607A!)
        sub_index: 0x00
        type: int32
        state_interface: velocity
        factor: 2.50446e-6
      # RIMUOVI: 0x607A (Target Position, non è un feedback!)
      # RIMUOVI: 0x6061 (non nel modulo PV, va via tpdo separato se serve)
